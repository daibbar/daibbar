services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: daibbar
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: blogdb
    volumes:
      - pgdata:/var/lib/postgresql/data    # ← persists your data
    ports:
      - "5432:5432"

  app:
    build: .
    image: daibbar
    ports:
      - "3000:3000"
    volumes:
      - ~/goinfre/daibbar:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://daibbar:secret@postgres:5432/mydb
    depends_on:
      - postgres

  volumes:
    pgdata:                                  # ← declares the volume
